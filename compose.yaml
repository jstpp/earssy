services:
    mysql:
        build:
            dockerfile: ./setup/mysql-dockerfile
        environment:
          MYSQL_ROOT_PASSWORD: earssy_db_root
          MYSQL_DATABASE: earssy_db
          MYSQL_USER: earssy_db
          MYSQL_PASSWORD: earssy_db
    web:
        build:
            dockerfile: ./setup/web-dockerfile
        ports:
          - '80:80'
        depends_on:
          - mysql
        volumes:
          - ./app/:/earssy/
        environment:
          - EARSY_SECRET_KEY=really_bad_key
        stop_signal: SIGINT
        command: python3 -m flask --app /earssy/app.py run -h 0.0.0.0 -p 80